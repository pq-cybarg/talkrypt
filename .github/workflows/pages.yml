# Publish the talkrypt feature wiki (docs/wiki/, built with MkDocs Material) to
# GitHub Pages. Enable once: repo Settings -> Pages -> Build and deployment ->
# Source: "GitHub Actions". Then every push to main that touches the wiki
# rebuilds and deploys the site. --strict fails the build on a broken link.
name: pages

# Run JavaScript-based actions on Node.js 24 — the newest stable, security-
# maintained runtime — instead of the deprecated Node 20. GitHub forces this by
# 2026-06-16; opting in now keeps every action on the supported, patched runtime.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
    paths:
      - "docs/wiki/**"
      - "mkdocs.yml"
      - "docs/requirements-pages.txt"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install -r docs/requirements-pages.txt
      - run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
